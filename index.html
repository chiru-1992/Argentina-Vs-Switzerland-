<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Tickets: Argentina vs Switzerland</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>1-on-1 Battles: Attack vs Defense</h1>
    <p>Enter the master code to unlock 23 exclusive outfield tickets!</p>

    <div class="controls">
        <input type="text" id="codeInput" placeholder="Enter master code...">
        <button id="submitBtn">Submit Code</button>
        <p id="errorMessage" class="error-msg">Incorrect Code. Hint: GOAT</p>
    </div>

    <div class="grid" id="ticketGrid"></div>

    <script src="script.js"></script>
</body>
</html>
